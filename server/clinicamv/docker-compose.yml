volumes:
  db_data: {}
  laravel_storage: {}

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: clinica
      MYSQL_USER: clinica
      MYSQL_PASSWORD: clinica
      MYSQL_ROOT_PASSWORD: root
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 30

  php:
    image: ghcr.io/roo-cio/clinicamv-backend:php-main
    env_file: [ ./secrets/clinica.env ]
    environment:
      MIGRATE_ON_START: "false" # Cambiar a "true" para que se ejecuten los seeders al iniciar el deploy
      SEED_ON_START: "false" # Igual que arriba
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - laravel_storage:/var/www/storage
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit((int)!@fsockopen(\"127.0.0.1\",9000));'"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s # Cuando ejecutemos migraciones, subir el tiempo a 360s para darle tiempo a que se ejecuten. Sino, en 60 esta bien.

  api:
    image: ghcr.io/roo-cio/clinicamv-backend:api-main
    restart: unless-stopped
    depends_on:
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/_health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    ports:
      - "8081:80"

  frontend:
    image: ghcr.io/roo-cio/clinicamv-frontend:main
    restart: unless-stopped
    depends_on: [ api ]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/_health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "8080:80"

  clinicamv-queue:
    image: ghcr.io/roo-cio/clinicamv-backend:php-main
    depends_on:
      php:
        condition: service_healthy
      db:
        condition: service_healthy
    # Usa el mismo entorno que php
    env_file: [ ./secrets/clinica.env ]
    entrypoint: []
    command: ["php","/var/www/artisan","queue:work","--queue=default,mail,notifications","--sleep=1","--tries=3","--timeout=120","-vvv"]
    working_dir: /var/www
    restart: unless-stopped
    volumes:
      - laravel_storage:/var/www/storage

  # Opcional: accesible desde localhost
  phpmyadmin:
    image: phpmyadmin:5.2
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 128M
    depends_on: [ db ]
    ports:
      - "127.0.0.1:8082:80"
